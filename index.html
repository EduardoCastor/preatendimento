<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atendimento Presencial</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

<body>
  <div class="bg"></div>
  <div class="container">
    <img src="assets/logo.webp" alt="Logo Prefeitura" class="logo">
    <h1>Prefeitura Municipal de Cabo Frio</h1>
    <h2>Secretaria Municipal de Educação</h2>
    <p>Pré-Atendimento Presencial</p>

<form id="formAtendeAgendamento">

  <select id="protocoloSelect" required>
    <option value="">Carregando...</option>
  </select>

  <select id="statusSelect" required>
    <option value="">Selecione o status</option>
    <option value="Pronto para Atendimento">Pronto para Atendimento</option>
    <option value="Atendido">Atendido</option>
    <option value="Ausente">Ausente</option>
  </select>

  <button type="submit">Confirmar</button>
</form>

  <div id="status" class="hidden">
    ✅ Atendimento atualizado com sucesso!<br>
    Compareça no horário selecionado.
  </div>



  <script src="script.js"></script>
</body>

</html>
